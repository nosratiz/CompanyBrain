# =============================================================================
# Docker Hub – DeepRoot multi-arch image
#
# Triggers on: push of a version tag  (v1.0.0, v2.3.1, …)
#
# Builds a single manifest covering two CPU architectures:
#   linux/amd64  → Intel / AMD (x86-64)
#   linux/arm64  → Apple Silicon & ARM servers
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME   – your Docker Hub username
#   DOCKERHUB_TOKEN      – Docker Hub access token (Account Settings → Security)
#
# Resulting image tags pushed to Docker Hub:
#   <username>/deeproot:1.0.0
#   <username>/deeproot:latest
# =============================================================================

name: Docker – Publish DeepRoot

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # matches v1.0.0, v2.3.1, etc.
      - "v[0-9]+.[0-9]+.[0-9]+-*"        # pre-releases: v1.0.0-rc.1

env:
  IMAGE_NAME: deeproot

jobs:
  docker:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Resolve version from git tag ────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          # Strip the leading 'v': v1.2.3 → 1.2.3
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      # ── 3. Log in to Docker Hub ────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Set up QEMU (needed for arm64 emulation on the amd64 runner) ───
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ── 5. Set up Docker Buildx ────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Extract Docker metadata (tags + labels) ─────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=DeepRoot
            org.opencontainers.image.description=DeepRoot Company Brain – API + MCP + Blazor UI
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      # ── 7. Build & push ────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored in the GitHub Actions cache to speed up re-builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 8. Summary ─────────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "### Docker image published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platforms** | linux/amd64 (Intel), linux/arm64 (Apple Silicon) |" >> "$GITHUB_STEP_SUMMARY"
