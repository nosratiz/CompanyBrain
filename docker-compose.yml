# CompanyBrain Docker Compose
# Run: docker compose up -d

services:
  # CompanyBrain Dashboard - Blazor UI + API + MCP server
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: companybrain-dashboard:latest
    container_name: companybrain-dashboard
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - dashboard-data:/app/data
      - ./InternalKnowledge:/app/InternalKnowledge:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dashboard-data:
    driver: local

networks:
  default:
    name: companybrain-network
