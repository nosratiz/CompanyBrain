# CompanyBrain Docker Compose
# Run all services: docker compose up -d
# Run specific service: docker compose up -d api

services:
  # CompanyBrain API - Main knowledge base API with MCP server
  api:
    build:
      context: .
      dockerfile: src/CompanyBrain/Dockerfile
    image: companybrain-api:latest
    container_name: companybrain-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - api-data:/app/data
      - ./InternalKnowledge:/app/InternalKnowledge:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # CompanyBrain Admin - User management and licensing admin panel
  admin:
    build:
      context: .
      dockerfile: src/CompanyBrain.Admin.Server/Dockerfile
    image: companybrain-admin:latest
    container_name: companybrain-admin
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__AdminDb=Host=postgres;Port=5432;Database=companybrain_admin;Username=postgres;Password=postgres
      - Jwt__Key=CompanyBrain_Admin_Docker_Secret_Key_Min32Chars!
      - Jwt__Issuer=CompanyBrain.Admin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL database for Admin Server
  postgres:
    image: postgres:17-alpine
    container_name: companybrain-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=companybrain_admin
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CompanyBrain MultiTenant - Multi-tenant management API
  multitenant:
    build:
      context: .
      dockerfile: src/CompanyBrain.MultiTenant/Dockerfile
    image: companybrain-multitenant:latest
    container_name: companybrain-multitenant
    ports:
      - "8083:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__TenantDb=Data Source=/app/data/tenants.db
      - Storage__BasePath=/app/data/tenants
      - Jwt__Key=CompanyBrain_MultiTenant_Docker_Secret_Key_Min32Chars!
      - Jwt__Issuer=CompanyBrain.MultiTenant
    volumes:
      - multitenant-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  api-data:
    driver: local
  postgres-data:
    driver: local
  multitenant-data:
    driver: local

networks:
  default:
    name: companybrain-network
